  <!-- Phase 1: Lead Intake Overlay -->
  <div id="intro-overlay" class="overlay-container">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Initial Lead Registration</h2>
        <p>Capturing preliminary prospect details.</p>
      </div>
      <div class="form-grid">
        <div class="form-group full-width"><label>Contact Name</label>
          <div style="position:relative"><input type="text" id="fieldName" readonly></div>
        </div>
        <div class="form-group full-width"><label>Company</label>
          <div style="position:relative"><input type="text" id="fieldCompany" readonly></div>
        </div>
        <div class="form-group"><label>Email Address</label>
          <div style="position:relative"><input type="text" id="fieldEmail" readonly></div>
        </div>
        <div class="form-group"><label>Phone Number</label>
          <div style="position:relative"><input type="text" id="fieldPhone" readonly></div>
        </div>
      </div>
      <button class="btn" id="submitBtn" onclick="executeFlow()"><span class="spinner"></span><span class="text">Capture
          Lead</span></button>
    </div>
  </div>
