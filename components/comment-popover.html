  <!-- ===== FLOATING COMMENT POPOVER ===== -->
  <div id="comment-popover"
    style="position:fixed; display:none; flex-direction:column; gap:0; width:300px; background:white; border-radius:12px; box-shadow:0 20px 40px -8px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06); z-index:99999; overflow:hidden;">
    <!-- Header -->
    <div
      style="background:#0f172a; padding:12px 16px; display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <span style="font-size:12px; font-weight:700; color:white;">Add Partner Note</span>
      </div>
      <button onclick="hideCommentPopover()"
        style="background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; padding:4px 8px; border-radius:4px; font-size:12px; line-height:1;">✕</button>
    </div>
    <!-- Selected text preview -->
    <div id="selected-text-preview"
      style="margin:12px 16px 0; padding:8px 12px; background:#fef9ed; border:1px solid #fde68a; border-radius:6px; font-size:12px; color:#92400e; font-style:italic; line-height:1.4; max-height:60px; overflow:hidden; display:none;">
    </div>
    <!-- Input -->
    <div style="padding:12px 16px;">
      <textarea id="popover-comment-input" placeholder="Type your review note here..." rows="3"
        style="width:100%; border:1px solid #e2e8f0; border-radius:8px; padding:10px 12px; font-size:13px; font-family:inherit; resize:none; outline:none; line-height:1.5; color:#334155; transition: border-color 0.2s;"
        onfocus="this.style.borderColor='#2563eb'; this.style.boxShadow='0 0 0 3px rgba(37,99,235,0.1)';"
        onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none';"
        onkeydown="if(event.key==='Enter' && (event.ctrlKey||event.metaKey)) saveSelectionComment();"></textarea>
      <div style="font-size:10px; color:#94a3b8; margin-top:4px;">Ctrl+Enter to save</div>
    </div>
    <!-- Actions -->
    <div style="display:flex; gap:8px; padding:0 16px 16px;">
      <button onclick="hideCommentPopover()"
        style="flex:1; padding:8px; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; color:#64748b; transition:background 0.2s;"
        onmouseover="this.style.background='#e2e8f0';" onmouseout="this.style.background='#f1f5f9';">Cancel</button>
      <button onclick="saveSelectionComment()"
        style="flex:2; padding:8px; background:#2563eb; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; color:white; display:flex; align-items:center; justify-content:center; gap:6px; transition:background 0.2s;"
        onmouseover="this.style.background='#1d4ed8';" onmouseout="this.style.background='#2563eb';">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Add Comment
      </button>
    </div>
  </div>
